<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MedTrack — Your personal medication management companion. Track medications, schedules, and stay healthy." />
    <meta name="theme-color" content="#2D6A4F" />
    <title>MedTrack — Medication Manager</title>
    <style>
      /* Prevent flash of unstyled content */
      html { background: #F7F3EE; }
      html[data-theme="dark"] { background: #141210; }
    </style>
    <script>
      // Apply theme before React loads to prevent flash
      const t = localStorage.getItem('medtrack-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
      if (t === 'dark') document.documentElement.style.background = '#141210';
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
